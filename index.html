<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Academia</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Customizado -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Menu de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><strong>IranGym</strong> System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="listar_alunos.html">Alunos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="listar_instrutores.html">Instrutores</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Banner / Área de destaque -->
    <header class="bg-primary text-white text-center py-5">
        <div class="container">
            <h1 class="display-4">Visão Geral da Academia</h1>
            <p class="lead">Acompanhe os cadastros de alunos e a escala de instrutores.</p>
        </div>
    </header>

    <!-- Área onde vão entrar os Cards Informativos -->
<!-- Área de Cards Informativos -->
    <main class="container my-5">
        <div class="row text-center">
            <!-- Card 1 -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Total de Alunos</h5>
                        <p class="card-text display-6 text-primary">350</p>
                        <a href="listar_alunos.html" class="btn btn-outline-primary">Ver alunos</a>
                    </div>
                </div>
            </div>
            <!-- Card 2 -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Instrutores Ativos</h5>
                        <p class="card-text display-6 text-success">12</p>
                        <a href="listar_instrutores.html" class="btn btn-outline-success">Ver equipe</a>
                    </div>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Novas Matrículas</h5>
                        <p class="card-text display-6 text-warning">8</p>
                        <a href="cadastrar_aluno.html" class="btn btn-outline-warning">Cadastrar</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JS Customizado -->
    <script src="js/script.js"></script>
</body>
</html>
