<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Instrutor - IranGym System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS Customizado -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Menu de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><strong>IranGym</strong> System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="listar_alunos.html">Alunos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cadastrar_instrutor.html">Instrutores</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Área do Formulário -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">Cadastro de Novo Instrutor</h4>
                    </div>
                    <div class="card-body">
                        <form action="listar_instrutores.html">
                            
                            <div class="mb-3">
                                <label for="nomeInstrutor" class="form-label">Nome do Instrutor</label>
                                <input type="text" class="form-control" id="nomeInstrutor" placeholder="Digite o nome completo" required>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="especialidade" class="form-label">Especialidade</label>
                                    <select class="form-select" id="especialidade" required>
                                        <option value="" selected disabled>Selecione...</option>
                                        <option value="musculacao">Musculação</option>
                                        <option value="crossfit">Crossfit</option>
                                        <option value="danca">Dança/Zumba</option>
                                        <option value="lutas">Artes Marciais</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="turno" class="form-label">Turno</label>
                                    <select class="form-select" id="turno" required>
                                        <option value="" selected disabled>Selecione o turno...</option>
                                        <option value="manha">Manhã</option>
                                        <option value="tarde">Tarde</option>
                                        <option value="noite">Noite</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="emailInstrutor" class="form-label">E-mail</label>
                                    <input type="email" class="form-control" id="emailInstrutor" placeholder="nome@exemplo.com" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="telefoneInstrutor" class="form-label">Telefone</label>
                                    <input type="tel" class="form-control" id="telefoneInstrutor" placeholder="(00) 00000-0000" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="index.html" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-success">Salvar Cadastro</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
