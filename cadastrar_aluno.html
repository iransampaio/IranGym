<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Aluno - IranGym System</title>
    <!-- Bootstrap CSS -->
<link href="assets/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Menu de Navegação (Igual ao da Home) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><strong>IranGym</strong> System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cadastrar_aluno.html">Alunos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="listar_instrutores.html">Instrutores</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Área do Formulário -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Cadastro de Novo Aluno</h4>
                    </div>
                    <div class="card-body">
                        <form action="listar_alunos.html">
                            
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="nome" placeholder="Digite o nome completo" required>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="cpf" class="form-label">CPF</label>
                                    <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="telefone" class="form-label">Telefone</label>
                                    <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                            </div>

                            <div class="mb-4">
                                <label for="plano" class="form-label">Plano Contratado</label>
                                <select class="form-select" id="plano" required>
                                    <option value="" selected disabled>Selecione um plano...</option>
                                    <option value="mensal">Mensal - R$ 90,00</option>
                                    <option value="trimestral">Trimestral - R$ 250,00</option>
                                    <option value="semestral">Semestral - R$ 450,00</option>
                                    <option value="anual">Anual (Premium) - R$ 800,00</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="index.html" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-success">Salvar Cadastro</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
<script src="assets/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
